<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>The Smashery</title>
  <style>
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f4f4f4;
      display: flex;
      flex-direction: column;
    }
    header {
      background: #8b3a1b;
      color: #fff;
      padding: 14px;
      text-align: center;
      font-size: 1.2rem;
      font-weight: 600;
    }
    #chat {
      flex: 1;
      overflow-y: auto;
      width: 100%;
      max-width: 680px;
      margin: 0 auto;
      padding: 16px;
    }
    .msg {
      max-width: 80%;
      margin: 6px 0;
      padding: 8px 12px;
      border-radius: 10px;
      line-height: 1.4;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .user {
      background: #d6e8d6;
      margin-left: auto;
    }
    .assistant {
      background: #fff;
      border: 1px solid #ddd;
    }
    .error {
      background: #fcdede;
      border: 1px solid #e0a0a0;
      color: #8a1f1f;
    }
    .pending { color: #888; font-style: italic; }
    #composer {
      display: flex;
      gap: 8px;
      width: 100%;
      max-width: 680px;
      margin: 0 auto;
      padding: 12px 16px;
      background: #fff;
      border-top: 1px solid #ddd;
    }
    #question {
      flex: 1;
      padding: 9px;
      font-size: 1rem;
      border: 1px solid #ccc;
      border-radius: 6px;
    }
    #send {
      padding: 9px 18px;
      font-size: 1rem;
      color: #fff;
      background: #8b3a1b;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    #send:disabled { opacity: 0.5; cursor: default; }
  </style>
</head>
<body>
  <header>The Smashery</header>
  <div id="chat"></div>
  <form id="composer">
    <input id="question" type="text" autocomplete="off" autofocus
           placeholder="Ask about our menu, hours, or dietary options..." />
    <button id="send" type="submit">Send</button>
  </form>

  <script>
    const chat = document.getElementById("chat");
    const form = document.getElementById("composer");
    const input = document.getElementById("question");
    const send = document.getElementById("send");

    function addMessage(text, className) {
      const el = document.createElement("div");
      el.className = "msg " + className;
      el.textContent = text;
      chat.appendChild(el);
      chat.scrollTop = chat.scrollHeight;
      return el;
    }

    form.addEventListener("submit", async function (e) {
      e.preventDefault();
      const question = input.value.trim();
      if (!question) return;

      addMessage(question, "user");
      input.value = "";
      send.disabled = true;
      const pending = addMessage("thinking...", "assistant pending");

      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question: question }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || ("HTTP " + res.status));
        pending.textContent = data.answer;
        pending.className = "msg assistant";
      } catch (err) {
        pending.textContent = "Error: " + err.message;
        pending.className = "msg error";
      } finally {
        send.disabled = false;
        input.focus();
      }
    });
  </script>
</body>
</html>
